name: "OpenAPI CI: Validate, Bundle, Publish"

on:
  push:
    branches:
      - '**'
    tags:
      - "*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint OpenAPI Specification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli

      - name: Run Redocly lint
        run: redocly lint openapi.yaml

  bump-version:
    name: Create Next Semantic Version Tag
    needs: validate
    if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.get_version.outputs.new_tag }}
    steps:
      - name: Checkout repository with tag history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push version tag
        id: bump_version
        uses: anothrNick/github-tag-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
          WITH_V: false
          
      - name: Expose created tag as job output
        id: get_version
        run: |
          NEW_TAG="${{ steps.bump_version.outputs.new_tag }}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

  bundle:
    name: Build OpenAPI Bundle and Docs
    needs:
      - validate
      - bump-version
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli

      - name: Install yq binary
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod a+x /usr/local/bin/yq

      - name: Set OpenAPI info.version from created tag
        run: |
          yq -i '.info.version = strenv(NEW_VERSION)' openapi.yaml
        env:
          NEW_VERSION: ${{ needs.bump-version.outputs.new_version }}

      - name: Generate bundled OpenAPI file
        run: |
          mkdir -p bundle
          redocly bundle openapi.yaml --output bundle/openapi.yaml

      - name: Generate static API documentation
        run: |
          redocly build-docs bundle/openapi.yaml -o bundle/index.html

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: bundle/
          retention-days: 1

      - name: Commit and push bundled spec updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add openapi.yaml bundle/openapi.yaml bundle/index.html
          git commit -m "Update OpenAPI specification to version ${{ needs.bump-version.outputs.new_version }}" || echo "No changes to commit"
          git push || echo "No changes to push"

  deploy-pages:
    name: Publish Docs to GitHub Pages
    needs: bundle
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: bundle
          path: bundle

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages deployment artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: bundle

      - name: Deploy Pages site
        id: deployment
        uses: actions/deploy-pages@v4

  create-api-pr:
    name: Create OversizeAPI Update PR
    needs:
      - bundle
      - bump-version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout target repository (OversizeAPI)
        uses: actions/checkout@v4
        with:
          repository: oversizedev/OversizeAPI
          token: ${{ secrets.ACTIONS_TOKEN }}
          path: target_repo
          fetch-depth: 1
          ref: main

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: bundle
          path: bundle

      - name: Configure git in target repository
        run: |
          cd target_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Create feature branch in target repository
        run: |
          cd target_repo
          BRANCH_NAME="openapi/spec-${{ needs.bump-version.outputs.new_version }}"
          git checkout -b $BRANCH_NAME
          
      - name: Copy bundled OpenAPI file to target repository
        run: |
          cp -v bundle/openapi.yaml target_repo/Sources/App/
          cd target_repo
          
      - name: Detect staged changes
        id: check-changes
        run: |
          cd target_repo
          git add .
          if ! git diff --staged --quiet; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push feature branch
        if: steps.check-changes.outputs.changes_detected == 'true'
        run: |
          cd target_repo
          BRANCH_NAME="openapi/spec-${{ needs.bump-version.outputs.new_version }}"
          git commit -m "Update OpenAPI specification"
          git push -u origin $BRANCH_NAME

      - name: Create pull request in OversizeAPI
        if: steps.check-changes.outputs.changes_detected == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
        run: |
          cd target_repo
          BRANCH_NAME="openapi/spec-${{ needs.bump-version.outputs.new_version }}"
          gh pr create \
            --repo oversizedev/OversizeAPI \
            --title "chore(openapi): sync bundled spec to ${{ needs.bump-version.outputs.new_version }}" \
            --body "Automated update from ${{ github.repository }}. This PR syncs the bundled OpenAPI specification to version ${{ needs.bump-version.outputs.new_version }}." \
            --base main \
            --head $BRANCH_NAME \
            --label open-api

  create-apps-pr:
    name: Create OversizeApps Update PR
    needs:
      - bundle
      - bump-version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout target repository (OversizeApps)
        uses: actions/checkout@v4
        with:
          repository: oversizedev/OversizeApps
          token: ${{ secrets.ACTIONS_TOKEN }}
          path: target_repo
          fetch-depth: 1
          ref: main

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: bundle
          path: bundle

      - name: Configure git in target repository
        run: |
          cd target_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create feature branch in target repository
        run: |
          cd target_repo
          BRANCH_NAME="openapi/spec-${{ needs.bump-version.outputs.new_version }}"
          git checkout -b $BRANCH_NAME

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenAPI Generator CLI
        run: npm install -g @openapitools/openapi-generator-cli
        env:
          OPENAPI_GENERATOR_VERSION: 7.7.0

      - name: Generate TypeScript API client
        run: |
          openapi-generator-cli generate \
            -i bundle/openapi.yaml \
            -g typescript-fetch \
            -o target_repo/src/api
        env:
          OPENAPI_GENERATOR_VERSION: 7.7.0

      - name: Run API post-processing script
        working-directory: target_repo
        run: node post-process-api.js

      - name: Detect staged changes
        id: check-changes
        run: |
          cd target_repo
          git add .
          if ! git diff --staged --quiet; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push feature branch
        if: steps.check-changes.outputs.changes_detected == 'true'
        run: |
          cd target_repo
          BRANCH_NAME="openapi/spec-${{ needs.bump-version.outputs.new_version }}"
          git commit -m "Update OpenAPI specification"
          git push -u origin $BRANCH_NAME

      - name: Create pull request in OversizeApps
        if: steps.check-changes.outputs.changes_detected == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
        run: |
          cd target_repo
          BRANCH_NAME="openapi/spec-${{ needs.bump-version.outputs.new_version }}"
          gh pr create \
            --repo oversizedev/OversizeApps \
            --title "chore(openapi): regenerate API client for ${{ needs.bump-version.outputs.new_version }}" \
            --body "Automated update from ${{ github.repository }}. This PR regenerates the API client from OpenAPI version ${{ needs.bump-version.outputs.new_version }}." \
            --base main \
            --head $BRANCH_NAME \
            --label open-api

  create-network-pr:
    name: Create OversizeNetwork Update PR
    needs:
      - bundle
      - bump-version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout target repository (OversizeNetwork)
        uses: actions/checkout@v4
        with:
          repository: oversizedev/OversizeNetwork
          token: ${{ secrets.ACTIONS_TOKEN }}
          path: target_repo
          fetch-depth: 1
          ref: main

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: bundle
          path: bundle

      - name: Configure git in target repository
        run: |
          cd target_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Create feature branch in target repository
        run: |
          cd target_repo
          BRANCH_NAME="openapi/spec-${{ needs.bump-version.outputs.new_version }}"
          git checkout -b $BRANCH_NAME
          
      - name: Copy bundled OpenAPI file to target repository
        run: |
          cp -v bundle/openapi.yaml target_repo/Sources/OversizeNetwork/
          cd target_repo
          
      - name: Detect staged changes
        id: check-changes
        run: |
          cd target_repo
          git add .
          if ! git diff --staged --quiet; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push feature branch
        if: steps.check-changes.outputs.changes_detected == 'true'
        run: |
          cd target_repo
          BRANCH_NAME="openapi/spec-${{ needs.bump-version.outputs.new_version }}"
          git commit -m "Update OpenAPI specification"
          git push -u origin $BRANCH_NAME

      - name: Create pull request in OversizeNetwork
        if: steps.check-changes.outputs.changes_detected == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
        run: |
          cd target_repo
          BRANCH_NAME="openapi/spec-${{ needs.bump-version.outputs.new_version }}"
          gh pr create \
            --repo oversizedev/OversizeNetwork \
            --title "chore(openapi): sync network spec to ${{ needs.bump-version.outputs.new_version }}" \
            --body "Automated update from ${{ github.repository }}. This PR syncs the OpenAPI specification to version ${{ needs.bump-version.outputs.new_version }}." \
            --base main \
            --head $BRANCH_NAME \
            --label open-api


  release:
    name: Publish Tagged Release
    needs: validate
    if: github.ref != 'refs/heads/main' && startsWith(github.ref, 'refs/tags/')
    uses: oversizedev/GithubWorkflows/.github/workflows/release.yml@main
    secrets: inherit
