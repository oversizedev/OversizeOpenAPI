description: Application version details
content:
  application/json:
    schema:
      type: object
      description: Application version details
      required:
        - version
      properties:
        version:
          $ref: '../../schemas/update/Version.yaml'
          description: Single version details
      example:
        version:
          id: 6443709281
          version: "2.1.0"
          releasedAt: "2022-12-31T00:00:00Z"
          whatsNew: "Performance improvements and bug fixes"
          features:
            - id: "1"
              title: "No Ads"
              textSize: "medium"
              textAlignment: "center"
              screenshots: []
