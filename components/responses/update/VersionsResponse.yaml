description: List of application versions
content:
  application/json:
    schema:
      type: object
      description: List of application versions
      required:
        - versions
      properties:
        versions:
          type: array
          description: Collection of application versions
          items:
            $ref: '../../schemas/update/Version.yaml'
      example:
        versions:
          - id: 6443709281
            version: "2.1.0"
            releasedAt: "2022-12-31"
            whatsNew: "Performance improvements and bug fixes"
            features:
              - id: "1"
                title: "No Ads"
                textSize: "medium"
                textAlignment: "center"
                screenshots: []
          - id: 6443709280
            version: "2.0.0"
            releasedAt: "2022-06-01"
            whatsNew: "Major redesign with new features"
            features: []
