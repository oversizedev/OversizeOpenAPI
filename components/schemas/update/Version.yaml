type: object
required:
  - id
  - version
  - releasedAt
properties:
  id:
    type: integer
    example: 1
  version:
    type: string
    description: Version identifier (semver)
    example: "2.1.0"
  releasedAt:
    type: string
    format: date-time
    example: "2025-08-15T10:30:00Z"
  whatsNew:
    type: string
    description: Summary of changes in this version
    example: "Performance improvements and bug fixes"
  features:
    type: array
    description: Features introduced or updated in this version
    items:
      $ref: '../feature/Feature.yaml'
